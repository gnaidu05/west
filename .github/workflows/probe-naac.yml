name: Probe NAAC sources

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pypdf
      - run: python3 scripts/probe_naac.py
      - name: Commit probe report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add probe/naac_probe.txt
          git commit -m "NAAC probe report" || echo "no changes"
          git push origin main
