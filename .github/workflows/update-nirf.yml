name: Update NIRF directory

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Rebuild directory from nirfindia.org
        run: python3 scripts/build_nirf_directory.py
      - name: Commit if changed
        run: |
          if git diff --quiet index.html; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Refresh NIRF directory from nirfindia.org"
          git push origin main
