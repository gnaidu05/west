name: Update NAAC directory

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Fetch NAAC accreditation list
        run: python3 scripts/build_naac_directory.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html probe/naac_fetch_report.txt
          git commit -m "Refresh NAAC directory from NAAC EC list" || echo "No changes."
          git push origin main
